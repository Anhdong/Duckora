---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/anhdong/duckora

name: duckora
description: Mobun's opinionated Fedora Silverblue setup. Duck-approved!

base-image: ghcr.io/blue-build/base-images/fedora-silverblue
image-version: 44


modules:
  - type: os-release
    properties:
      ID: duckora
      NAME: Duckora
      PRETTY_NAME: Duckora(Silverblue)

  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      cleanup: true
      files:
        - vscodium.repo
      #copr:
      #  - atim/starship
    install:
      skip-unavailable: true
      install-weak-deps: false
      allow-erasing: true
      packages:
        - bat
        - eza
        - fzf
        - zoxide
      #  - starship
        - codium
    remove:
      auto-remove: true
      packages:
        - gnome-system-monitor
        - gnome-software
        - firefox
        - firefox-langpacks
        - htop
        - nvtop


  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: default-flatpaks
    configurations:
      - scope: system
        repo:
          title: Flathub (system)
        install:
          - io.github.kolunmi.Bazaar
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
          - com.ranfdev.DistroShelf
          - io.missioncenter.MissionCenter
          - org.gnome.Loupe
          - com.vixalien.sticky
          - io.gitlab.adhami3310.Impression
          - org.localsend.localsend_app
          - app.drey.Warp
          - app.zen_browser.zen
          - com.protonvpn.www

      - scope: user
        repo:
          title: Flathub (user)
        install:
          - org.onlyoffice.desktopeditors
          - com.notesnook.Notesnook
          - dev.vencord.Vesktop
          - io.github.Faugus.faugus-launcher
          - io.ente.auth
          - com.bitwarden.desktop
          - org.kde.kdenlive
          - org.inkscape.Inkscape
          - org.audacityteam.Audacity
          - com.obsproject.Studio
          - org.godotengine.Godot

  - type: gnome-extensions
    install:
      - Blur my Shell
      - Dash2Dock Animated
      - Just Perfection
      - Logo Menu
      - Clipboard History
      - Color Picker
      - GNOME Fuzzy App Search
      - GSConnect
      - Vitals
      # Search light (unavailble in 44 yet)

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
